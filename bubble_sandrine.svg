<svg width="320" height="680" viewBox="0 0 320 670" xmlns="http://www.w3.org/2000/svg">
  <!-- Bubble -->
  <path d="
    M 30 30
    Q 10 30 10 50
    L 10 650
    Q 10 670 30 670
    L 290 670
    Q 310 670 310 650
    L 310 50
    Q 310 30 290 30
    L 270 30
    L 285 5
    L 240 30
    L 30 30
    Z
  " fill="#FFF131" stroke="#84259F" stroke-width="4" stroke-linejoin="round"/>

  <!-- Text -->
  <text x="160" y="125"   font-family="Comic Sans MS" font-size="30" font-weight="bold" fill="#84259F" text-anchor="middle">Tout à commencé</text>
  <text x="160" y="175"  font-family="Comic Sans MS" font-size="30" font-weight="bold" fill="#84259F" text-anchor="middle">par notre</text>
  <text x="160" y="225"  font-family="Comic Sans MS" font-size="30" font-weight="bold" fill="#84259F" text-anchor="middle">rencontre au pied</text>
  <text x="160" y="275"  font-family="Comic Sans MS" font-size="30" font-weight="bold" fill="#84259F" text-anchor="middle">d’un escalier</text>
  <text x="160" y="325"  font-family="Comic Sans MS" font-size="30" font-weight="bold" fill="#84259F" text-anchor="middle">colimaçon, un détail</text>
  <text x="160" y="375"  font-family="Comic Sans MS" font-size="30" font-weight="bold" fill="#84259F" text-anchor="middle">qui semble tout</text>
  <text x="160" y="425"  font-family="Pangolin, cursive" font-size="30" font-weight="bold" fill="#84259F" text-anchor="middle">droit sorti d'un</text>
  <text x="160" y="475"  font-family="Pangolin, cursive" font-size="30" font-weight="bold" fill="#84259F" text-anchor="middle">scénario ! De cette</text>
  <text x="160" y="525"  font-family="Pangolin, cursive" font-size="30" font-weight="bold" fill="#84259F" text-anchor="middle">rencontre est née</text>
  <text x="160" y="575"  font-family="Pangolin, cursive" font-size="30" font-weight="bold" fill="#84259F" text-anchor="middle">une idée folle…</text>
